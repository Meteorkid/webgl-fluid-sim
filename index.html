<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Cache-Control" content="no-cache">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="mobile-web-app-capable" content="yes">

        <link rel="apple-touch-icon" href="logo.png">
        <link rel="icon" href="logo.png">

        <title>WebGL Fluid Simulation</title>
        <meta name="description" content="A WebGL fluid simulation that works in mobile browsers.">

        <meta property="og:type" content="website">
        <meta property="og:title" content="Webgl Fluid Simulation">
        <meta property="og:description" content="A WebGL fluid simulation that works in mobile browsers.">
        <meta property="og:url" content="https://meteorkid.github.io/webgl-fluid-sim/">
        <meta property="og:image" content="https://meteorkid.github.io/webgl-fluid-sim/logo.png">

        <script type="text/javascript" src="dat.gui.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
        <style>
            @font-face {
                font-family: 'iconfont';
                src: url('iconfont.ttf') format('truetype');
            }

            * {
                user-select: none;
            }

            html, body {
                overflow: hidden;
                background-color: #000;
            }

            body {
                margin: 0;
                position: fixed;
                width: 100%;
                height: 100%;
            }

            #fluidCanvas {
                width: 100%;
                height: 100%;
                position: fixed;
                z-index: 2;
            }

            .dg {
                opacity: 0.9;
            }
            .dg.ac {
                z-index: 10 !important;
            }

            .dg .property-name {
                overflow: visible;
            }

            .bigFont {
                font-size: 150%;
                color: #8C8C8C;
            }

            .cr.function.appBigFont {
                font-size: 150%;
                line-height: 27px;
                color: #A5F8D3;
                background-color: #023C40;
            }

            .cr.function.appBigFont .property-name {
                float: none;
            }

            .cr.function.appBigFont .icon {
                position: sticky;
                bottom: 27px;
            }

            .icon {
                font-family: 'iconfont';
                font-size: 130%;
                float: right;
            }

            .twitter:before {
                content: 'a';
            }

            .github:before {
                content: 'b';
            }

            .app:before {
                content: 'c';
            }

            .discord:before {
                content: 'd';
            }

            /* 摄像头全屏背景 */
            #cameraBg {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                object-fit: cover;
                z-index: 0;
                filter: blur(18px) brightness(0.7) saturate(1.2);
            }
            /* 水雾蒙版层 */
            .fog-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                z-index: 1;
                pointer-events: none;
                background:
                    radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.3) 100%),
                    linear-gradient(180deg, rgba(180,200,220,0.15) 0%, rgba(100,120,140,0.25) 100%);
                mix-blend-mode: screen;
            }

        </style>
    </head>
    <body>
        <!-- 摄像头背景 + 水雾蒙版 -->
        <canvas id="cameraBg" width="640" height="480"></canvas>
        <div class="fog-overlay" id="fogOverlay"></div>

        <!-- 流体模拟主 canvas -->
        <canvas id="fluidCanvas"></canvas>

        <!-- 隐藏视频（手势检测用） -->
        <video id="gestureVideo" playsinline style="visibility:hidden;position:absolute;width:1px;height:1px"></video>

        <script src="./script.js"></script>
    </body>
</html>
